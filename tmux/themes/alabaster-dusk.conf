## Alabaster Dusk

BG="#120f18"
FG="#c8c0d2"
ACCENT="#b078b8"
MUTED="#7a5888"
SUBTLE="#201828"
BORDER="#382840"

set -g status-style "fg=${FG},bg=${BG}"
set -g status-position bottom
set -g status-justify left
set -g status-left-length 40
set -g status-right-length 60

set -g status-left "#[fg=${ACCENT},bold] #S #[fg=${BORDER},nobold] "
set -g status-right "#[fg=${MUTED}] #h  %H:%M "

set -g window-status-format "#[fg=${MUTED}] #I:#W "
set -g window-status-current-format "#[fg=${ACCENT},bold] #I:#W "
set -g window-status-separator ""

set -g pane-border-style "fg=${BORDER}"
set -g pane-active-border-style "fg=${ACCENT}"

set -g message-style "fg=${FG},bg=${SUBTLE}"
set -g message-command-style "fg=${FG},bg=${SUBTLE}"
set -g mode-style "fg=${BG},bg=${ACCENT}"
